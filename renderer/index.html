<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人记账</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== 顶部区域 ====== -->
  <div class="header">
    <div class="header-title">💰 个人记账</div>
    <div class="header-month" id="headerMonth">2026年7月</div>
    <div class="header-total">
      <span class="total-label">本月支出</span>
      <span class="total-amount" id="totalAmount">¥0.00</span>
    </div>
  </div>

  <!-- ====== 操作按钮栏 ====== -->
  <div class="action-bar">
    <button class="btn-add" id="btnAdd">➕ 记一笔</button>
    <button class="btn-stats" id="btnStats">📊 月度统计</button>
    <button class="btn-category" id="btnCategory">⚙️ 分类</button>
    <button class="btn-snake" id="btnSnake">🐍 贪吃蛇</button>
  </div>
  <div class="action-bar action-bar-sub">
    <button class="btn-export" id="btnExport">📥 导出 Excel</button>
    <button class="btn-import" id="btnImport">📤 导入 Excel</button>
  </div>

  <!-- ====== 分类筛选标签 ====== -->
  <div class="filter-bar" id="filterBar">
    <!-- 动态生成分类标签 -->
  </div>

  <!-- ====== 支出列表 ====== -->
  <div class="expense-list" id="expenseList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📝</div>
      <div class="empty-text">还没有记录</div>
      <div class="empty-hint">点击「记一笔」开始记账吧</div>
    </div>
  </div>

  <!-- ====== 记一笔弹窗（默认隐藏） ====== -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="expenseModal">
      <div class="modal-header">
        <span id="modalTitle">记一笔</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <!-- 金额输入 -->
        <div class="form-group">
          <label>金额（元）</label>
          <input type="number" id="inputAmount" placeholder="0.00" step="0.01" min="0.01" autofocus>
        </div>

        <!-- 大类选择 -->
        <div class="form-group">
          <label>支出大类</label>
          <div class="category-grid" id="majorGrid">
            <!-- 动态生成大类选项 -->
          </div>
        </div>

        <!-- 小类选择 -->
        <div class="form-group">
          <label>支出小类</label>
          <select id="selectMinor">
            <option value="">请先选择大类</option>
          </select>
        </div>

        <!-- 日期 -->
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="inputDate">
        </div>

        <!-- 备注 -->
        <div class="form-group">
          <label>备注（可选）</label>
          <input type="text" id="inputNote" placeholder="例如：在全家买的饭团">
        </div>

        <!-- 隐藏字段：编辑模式时使用 -->
        <input type="hidden" id="editId" value="">
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancel">取消</button>
        <button class="btn-save" id="btnSave">保存</button>
      </div>
    </div>
  </div>

  <!-- ====== 统计弹窗（默认隐藏） ====== -->
  <div class="modal-overlay" id="statsOverlay" style="display:none;">
    <div class="modal stats-modal" id="statsModal">
      <div class="modal-header">
        <span>📊 月度统计</span>
        <button class="modal-close" id="statsClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="stats-month-selector">
          <input type="month" id="statsMonth">
        </div>
        <div class="chart-container">
          <canvas id="pieChart"></canvas>
        </div>
        <div class="stats-list" id="statsList">
          <!-- 动态生成各分类统计 -->
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 分类管理弹窗（默认隐藏） ====== -->
  <div class="modal-overlay" id="catOverlay" style="display:none;">
    <div class="modal cat-modal" id="catModal">
      <div class="modal-header">
        <span>⚙️ 管理分类</span>
        <button class="modal-close" id="catClose">✕</button>
      </div>
      <div class="modal-body" id="catBody">
        <!-- 新增分类表单 -->
        <div class="cat-add-section">
          <div class="cat-add-row">
            <select id="catAddType">
              <option value="minor">新增小类</option>
              <option value="major">新增大类</option>
            </select>
            <select id="catAddParent" style="display:none;">
              <!-- 动态填充大类选项 -->
            </select>
            <input type="text" id="catAddName" placeholder="分类名称" maxlength="10">
            <input type="text" id="catAddIcon" placeholder="😀" maxlength="2" class="icon-input" onclick="this.select()">
            <button class="btn-cat-add" id="btnCatAdd">添加</button>
          </div>
          <!-- Emoji 快速选择面板 -->
          <div class="emoji-picker" id="emojiPicker">
            <span class="emoji-option" title="餐饮">🍜</span>
            <span class="emoji-option" title="早餐">🥛</span>
            <span class="emoji-option" title="午餐">🍱</span>
            <span class="emoji-option" title="晚餐">🍽️</span>
            <span class="emoji-option" title="零食">🍿</span>
            <span class="emoji-option" title="饮品">🧋</span>
            <span class="emoji-option" title="聚餐">🥘</span>
            <span class="emoji-option" title="食材">🥬</span>
            <span class="emoji-option" title="交通">🚗</span>
            <span class="emoji-option" title="公交">🚌</span>
            <span class="emoji-option" title="打车">🚕</span>
            <span class="emoji-option" title="加油">⛽</span>
            <span class="emoji-option" title="停车">🅿️</span>
            <span class="emoji-option" title="火车">🚄</span>
            <span class="emoji-option" title="购物">🛒</span>
            <span class="emoji-option" title="日用品">🧴</span>
            <span class="emoji-option" title="衣物">👗</span>
            <span class="emoji-option" title="数码">💻</span>
            <span class="emoji-option" title="家居">🛋️</span>
            <span class="emoji-option" title="美妆">💄</span>
            <span class="emoji-option" title="住房">🏠</span>
            <span class="emoji-option" title="水费">💧</span>
            <span class="emoji-option" title="电费">⚡</span>
            <span class="emoji-option" title="燃气">🔥</span>
            <span class="emoji-option" title="物业">🏢</span>
            <span class="emoji-option" title="维修">🔧</span>
            <span class="emoji-option" title="娱乐">🎮</span>
            <span class="emoji-option" title="电影">🎬</span>
            <span class="emoji-option" title="游戏">🎯</span>
            <span class="emoji-option" title="旅游">✈️</span>
            <span class="emoji-option" title="健身">🏋️</span>
            <span class="emoji-option" title="KTV">🎤</span>
            <span class="emoji-option" title="会员">⭐</span>
            <span class="emoji-option" title="医疗">💊</span>
            <span class="emoji-option" title="门诊">🏥</span>
            <span class="emoji-option" title="买药">💉</span>
            <span class="emoji-option" title="体检">🩺</span>
            <span class="emoji-option" title="住院">🛌</span>
            <span class="emoji-option" title="教育">📚</span>
            <span class="emoji-option" title="课程">🎓</span>
            <span class="emoji-option" title="书籍">📖</span>
            <span class="emoji-option" title="文具">✏️</span>
            <span class="emoji-option" title="考试">📝</span>
            <span class="emoji-option" title="人情">🎁</span>
            <span class="emoji-option" title="送礼">🎀</span>
            <span class="emoji-option" title="红包">🧧</span>
            <span class="emoji-option" title="请客">🍻</span>
            <span class="emoji-option" title="聚会">🥂</span>
            <span class="emoji-option" title="其他">📦</span>
            <span class="emoji-option" title="快递">📬</span>
            <span class="emoji-option" title="服务费">💳</span>
            <span class="emoji-option" title="宠物">🐱</span>
            <span class="emoji-option" title="植物">🌿</span>
            <span class="emoji-option" title="咖啡">☕</span>
            <span class="emoji-option" title="蛋糕">🎂</span>
            <span class="emoji-option" title="音乐">🎵</span>
            <span class="emoji-option" title="相机">📷</span>
            <span class="emoji-option" title="手机">📱</span>
          </div>
        </div>
        <!-- 分类列表 -->
        <div class="cat-list" id="catList">
          <!-- 动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 贪吃蛇游戏弹窗（默认隐藏） ====== -->
  <div class="modal-overlay" id="snakeOverlay" style="display:none;">
    <div class="modal snake-modal" id="snakeModal">
      <div class="modal-header">
        <span>🐍 贪吃蛇</span>
        <button class="modal-close" id="snakeClose">✕</button>
      </div>
      <div class="modal-body snake-body">
        <div class="snake-score">
          得分：<span id="snakeScore">0</span>
        </div>
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
        <div class="snake-hint">使用 ↑ ↓ ← → 方向键控制蛇的移动</div>
        <button class="btn-snake-start" id="btnSnakeStart">🔄 重新开始</button>
      </div>
    </div>
  </div>

  <!-- Chart.js 图表库（本地文件），用于月度统计的饼图/甜甜圈图 -->
  <script src="chart.umd.min.js"></script>
  <!-- 工具函数，提供日期格式化等纯函数，必须在 app.js 之前加载 -->
  <script src="utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
